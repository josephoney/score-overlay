<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Control Marcador</title>
<link rel="stylesheet" href="css/control.css" />
</head>
<body>
<h1>⚽ Control de Marcador</h1>
<div class="status-bar">
  <div class="status-dot" id="sdot"></div>
  <span class="status-label" id="slbl">Conectando...</span>
</div>

<div class="preview">
  <div class="ts"><div class="tn" id="dna">LOCAL</div><div class="sn" id="dsa">0</div></div>
  <div class="sep">–</div>
  <div class="ts"><div class="tn" id="dnb">VISITA</div><div class="sn" id="dsb">0</div></div>
</div>

<div class="timer-box">
  <div class="tt s" id="td">00:00</div>
  <div class="tc">
    <button class="btn bs" id="btn-start" onclick="startTimer()">Iniciar</button>
    <button class="btn bp" id="btn-pause" onclick="pauseTimer()" disabled>Pausar</button>
    <button class="btn bd" onclick="stopTimer()">Detener</button>
    <button class="btn br" onclick="resetTimer()">Reset</button>
  </div>
</div>

<div class="sec">Equipos y marcador</div>
<div class="tb">
  <label>Equipo Local</label>
  <input class="ni" id="na" type="text" value="Local" maxlength="20" oninput="sync()" />
  <div class="sc">
    <label style="margin:0">Goles</label>
    <button class="sb sm" onclick="chScore('a',-1)">−</button>
    <div class="sv" id="sav">0</div>
    <button class="sb sp" onclick="chScore('a',1)">+</button>
  </div>
</div>
<div class="tb">
  <label>Equipo Visitante</label>
  <input class="ni" id="nb" type="text" value="Visita" maxlength="20" oninput="sync()" />
  <div class="sc">
    <label style="margin:0">Goles</label>
    <button class="sb sm" onclick="chScore('b',-1)">−</button>
    <div class="sv" id="sbv">0</div>
    <button class="sb sp" onclick="chScore('b',1)">+</button>
  </div>
</div>

<div class="sec">Información del partido</div>
<div class="pb">
  <span class="pl">Período / Tiempo</span>
  <select class="ps" id="per" onchange="sync()">
    <option value="">—</option>
    <option value="1T">1° Tiempo</option>
    <option value="2T">2° Tiempo</option>
    <option value="ET">Tiempo Extra</option>
    <option value="PT">Penaltis</option>
    <option value="HT">Descanso</option>
  </select>
</div>
<div class="eb">
  <span class="el">Texto libre (torneo, fecha...)</span>
  <input class="ei" id="ext" type="text" placeholder="Ej: Final" maxlength="16" oninput="sync()" />
</div>

<div class="footer">Firebase: scoreboard-e139e · Actualización en tiempo real</div>

<script type="module" src="js/control.js"></script>
</body>
</html>
